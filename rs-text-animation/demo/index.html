<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rs-text-animation demo</title>
<link rel="stylesheet" href="../dist/rs-text-animation.css">
<style>
:root{color-scheme:dark;--ink:#edf5ff;--muted:#9aabc1;--line:#2a405b;--panel:#111d2d;--cyan:#36d7e9;--lime:#b8e34b;--gold:#ffd64a}
*{box-sizing:border-box}body{margin:0;background:#09111d;color:var(--ink);font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}
header{display:flex;align-items:center;justify-content:space-between;gap:18px;min-height:64px;padding:16px clamp(16px,4vw,52px);border-bottom:1px solid var(--line);background:#0d1725}.brand{font-size:15px;font-weight:800}.brand:before{content:"";display:inline-block;width:12px;height:12px;margin-right:38px;background:var(--cyan);box-shadow:16px 0 var(--lime),32px 0 var(--gold)}.muted{color:var(--muted);font-size:12px}
main{width:min(1120px,calc(100% - 32px));margin:auto;padding:38px 0 64px}.eyebrow{margin:0 0 10px;color:var(--cyan);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}h1{margin:0;font-size:clamp(31px,5vw,58px);line-height:1.12}.lead{max-width:680px;margin:14px 0 34px;color:var(--muted);line-height:1.75}
.lab{display:grid;grid-template-columns:minmax(0,1fr) 310px;border:1px solid var(--line);background:var(--panel)}.stage{min-height:390px;padding:clamp(24px,5vw,54px);border-right:1px solid var(--line);display:flex;flex-direction:column;justify-content:space-between}.label{color:var(--muted);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}#preview{display:block;color:var(--lime);font-size:clamp(32px,5vw,68px);font-weight:800;line-height:1.2}.controls{padding:20px;background:#0e1928}.field{display:grid;gap:8px;margin-bottom:18px}.field label{color:var(--muted);font-size:12px;font-weight:700}textarea,select{width:100%;border:1px solid #38506d;border-radius:4px;background:#091421;color:var(--ink);padding:10px;outline:0}textarea{min-height:92px;resize:vertical}textarea:focus,select:focus,input:focus-visible,button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}input[type=range]{width:100%;accent-color:var(--cyan)}.row{display:flex;justify-content:space-between;color:var(--muted);font-size:12px}output{color:var(--cyan)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:22px}.button{min-height:39px;border:1px solid #3c5069;border-radius:4px;background:transparent;color:var(--ink);font-weight:700}.button.primary{border-color:var(--cyan);background:var(--cyan);color:#06212b}
.samples{display:grid;grid-template-columns:repeat(5,1fr);margin-top:34px;border:1px solid var(--line)}.sample{min-height:132px;padding:16px;border:0;border-right:1px solid var(--line);background:#0d1725;color:var(--ink);text-align:left}.sample:last-child{border:0}.sample strong{display:block;margin-top:22px;font-size:22px}.sample:nth-child(1) strong{color:var(--cyan)}.sample:nth-child(2) strong{color:var(--lime)}.sample:nth-child(3) strong{color:var(--gold)}.sample:nth-child(4) strong{color:#ff9fc8}.sample:nth-child(5) strong{color:#c5b4ff}
.rpg{margin-top:34px;border:4px solid #f5f7ff;box-shadow:inset 0 0 0 4px #1f45a0;background:#05070d;padding:8px}.screen{min-height:150px;padding:21px;border:2px solid #6c99ff;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:clamp(17px,2.6vw,24px);line-height:1.7;letter-spacing:.04em}#rpg-message{display:block;min-height:3.4em}.help{margin:10px 0 0;color:#b2c7ff;font-size:12px}
@media(max-width:740px){.lab{grid-template-columns:1fr}.stage{min-height:290px;border-right:0;border-bottom:1px solid var(--line)}.samples{grid-template-columns:1fr 1fr}.sample{border-bottom:1px solid var(--line)}.sample:nth-child(2n){border-right:0}.sample:last-child{border-bottom:0}}@media(max-width:420px){main{width:min(100% - 24px,1120px)}.samples{grid-template-columns:1fr}.sample{border-right:0}}
</style>
</head>
<body>
<header><span class="brand">rs-text-animation</span><span class="muted">v0.1.0 / dependency-free</span></header>
<main>
<p class="eyebrow">Text motion laboratory</p>
<h1>言葉に、正確なタイミングを。</h1>
<p class="lead">文字ごとの見せ方を選び、入力した文章をすぐに再生できます。RPGメッセージはクリックまたはEnterで進めます。</p>
<section class="lab" aria-label="Animation playground">
<div class="stage"><span class="label">Live preview</span><div id="preview">あなたの言葉を、動かす。</div><span id="status" class="muted" aria-live="polite">再生準備完了</span></div>
<form class="controls" id="controls">
<div class="field"><label for="text">TEXT</label><textarea id="text">あなたの言葉を、動かす。</textarea></div>
<div class="field"><label for="mode">EFFECT</label><select id="mode"><option value="typewriter">Typewriter</option><option value="reveal">Reveal</option><option value="bounce">Bounce</option><option value="scramble">Scramble</option><option value="slide">Slide</option><option value="flip">Flip</option><option value="blur">Blur</option><option value="wave">Wave</option><option value="glitch">Glitch</option></select></div>
<div class="field"><div class="row"><label for="speed">SPEED</label><output id="speed-value">55ms</output></div><input id="speed" type="range" min="20" max="160" step="5" value="55"></div>
<div class="actions"><button class="button primary" type="submit">再生</button><button class="button" id="pause" type="button">一時停止</button></div>
</form></section>
<section class="samples" aria-label="Effect samples">
<button class="sample" type="button" data-mode="typewriter"><span class="label">Typewriter</span><strong>HELLO!</strong></button>
<button class="sample" type="button" data-mode="reveal"><span class="label">Reveal</span><strong>流れる文字</strong></button>
<button class="sample" type="button" data-mode="bounce"><span class="label">Bounce</span><strong>JUMP</strong></button>
<button class="sample" type="button" data-mode="scramble"><span class="label">Scramble</span><strong>SIGNAL</strong></button>
<button class="sample" type="button" data-mode="slide"><span class="label">Slide</span><strong>MOVE</strong></button>
<button class="sample" type="button" data-mode="flip"><span class="label">Flip</span><strong>TURN</strong></button>
<button class="sample" type="button" data-mode="blur"><span class="label">Blur</span><strong>FOCUS</strong></button>
<button class="sample" type="button" data-mode="wave"><span class="label">Wave</span><strong>WAVE</strong></button>
<button class="sample" type="button" data-mode="glitch"><span class="label">Glitch</span><strong>ERROR</strong></button>
<button class="sample" type="button" data-mode="rpg"><span class="label">RPG</span><strong>ぼうけん</strong></button>
</section>
<section class="rpg"><div class="screen"><span id="rpg-message">ゆうしゃは まほうの かぎを てにいれた。</span><p class="help">CLICK / ENTER</p></div></section>
</main>
<script type="module">
import { createRSTextAnimation } from '../dist/rs-text-animation.esm.min.js';
const $ = (selector) => document.querySelector(selector);
const text = $('#text'), mode = $('#mode'), speed = $('#speed'), previewNode = $('#preview');
const status = $('#status'), pause = $('#pause');
let preview, isPaused = false;
function playPreview() {
  preview?.destroy();
  preview = createRSTextAnimation(previewNode, {
    text: text.value || ' ',
    mode: mode.value,
    speed: Number(speed.value),
    onStart: () => { status.textContent = mode.value + ' を再生中'; isPaused = false; pause.textContent = '一時停止'; },
    onComplete: () => { status.textContent = '再生完了'; },
  });
}
$('#controls').addEventListener('submit', (event) => { event.preventDefault(); playPreview(); });
speed.addEventListener('input', () => { $('#speed-value').textContent = speed.value + 'ms'; });
pause.addEventListener('click', () => { if (isPaused) { preview?.resume(); pause.textContent = '一時停止'; } else { preview?.pause(); pause.textContent = '再開'; } isPaused = !isPaused; });
document.querySelectorAll('[data-mode]').forEach((button) => {
  const node = button.querySelector('strong'), effect = button.dataset.mode;
  let instance = createRSTextAnimation(node, { mode: effect, speed: 65, autoStart: false, cursorChar: '▼' });
  button.addEventListener('click', () => { instance.destroy(); instance = createRSTextAnimation(node, { mode: effect, speed: 65, cursorChar: '▼' }); });
});
const lines = ['ゆうしゃは まほうの かぎを てにいれた。', 'とびらが ひらいた！', 'つぎの ぼうけんへ すすみますか？'];
let lineIndex = 0;
const rpg = createRSTextAnimation('#rpg-message', { mode: 'rpg', text: lines[0], speed: 48, cursorChar: '▼', advanceOnClick: true });
$('#rpg-message').addEventListener('rsta:advance', () => { lineIndex = (lineIndex + 1) % lines.length; rpg.setText(lines[lineIndex]); });
playPreview();
</script>
</body>
</html>
