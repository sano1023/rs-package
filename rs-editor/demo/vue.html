<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>rs-editor Vueラッパー デモ</title>
<link rel="stylesheet" href="../dist/rs-editor.css">
<style>
    body { font-family: system-ui, sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; color: #1e293b; }
    h1 { font-size: 18px; }
    .row { display: flex; gap: 8px; align-items: center; margin: 10px 0; flex-wrap: wrap; }
    button { padding: 6px 12px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; cursor: pointer; }
    textarea { width: 100%; height: 110px; font: 12px ui-monospace, monospace; }
    .note { font-size: 12px; color: #64748b; }
</style>
<script type="importmap">
{ "imports": { "vue": "https://cdn.jsdelivr.net/npm/vue@3/dist/vue.esm-browser.prod.js" } }
</script>
</head>
<body>
<h1>rs-editor × Vue 3（ビルド済み dist/rs-editor.vue.esm.min.js を使用）</h1>
<p class="note">※ 先に <code>node build.mjs rs-editor</code> で dist を生成しておくこと。vue は CDN の ESM ビルド。</p>
<div id="app"></div>

<script type="module">
    import { createApp, defineComponent, h, ref } from 'vue';
    import { RsEditor } from '../dist/rs-editor.vue.esm.min.js';

    const App = defineComponent({
        setup() {
            const html = ref('<p>Vueから<strong>こんにちは</strong></p>');
            const readonly = ref(false);
            const mounted = ref(true);
            const changeCount = ref(0);
            const editorRef = ref(null);
            window.state = { html, readonly, mounted, changeCount, editorRef };
            return () => h('div', [
                h('div', { class: 'row' }, [
                    h('label', [
                        h('input', {
                            type: 'checkbox', id: 'chk-readonly',
                            onChange: (e) => { readonly.value = e.target.checked; },
                        }),
                        ' readonly',
                    ]),
                    h('button', { id: 'btn-set', onClick: () => { html.value = '<p>親から流し込んだ<em>新しい内容</em></p>'; } }, '親からsetする'),
                    h('button', { id: 'btn-echo', onClick: () => { html.value = `${html.value}`; } }, '同じ値を書き戻す'),
                    h('button', { id: 'btn-unmount', onClick: () => { mounted.value = !mounted.value; } }, 'mount/unmount'),
                    h('span', { class: 'note' }, () => ''),
                ]),
                mounted.value
                    ? h(RsEditor, {
                        ref: editorRef,
                        modelValue: html.value,
                        'onUpdate:modelValue': (v) => { html.value = v; changeCount.value++; },
                        readonly: readonly.value,
                        toolbar: 'undo redo | bold italic underline | h1 h2 | bullist numlist | code',
                        placeholder: '本文を入力…',
                    })
                    : h('p', { class: 'note' }, 'アンマウント中'),
                h('h3', 'v-model の中身（リアルタイム）'),
                h('textarea', { id: 'out', value: html.value, readonly: true }),
                h('p', { class: 'note', id: 'count' }, `update:modelValue 発火回数: ${changeCount.value}`),
            ]);
        },
    });

    window.app = createApp(App);
    window.vm = window.app.mount('#app');
</script>
</body>
</html>
