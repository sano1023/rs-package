<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rs-baslider デモ</title>
<link rel="stylesheet" href="../dist/rs-baslider.css">
<style>
    body {
        font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
        margin: 0; background: #f1f5f9; color: #1e293b;
    }
    .page { max-width: 1000px; margin: 0 auto; padding: 32px 20px 120px; }
    h1 { font-size: 24px; }
    h1 small { font-size: 13px; color: #64748b; font-weight: 400; margin-left: 10px; }
    .lead { color: #475569; font-size: 14px; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px 18px; }
    .card h2 { font-size: 14px; margin: 0 0 10px; }
    .card.wide { grid-column: 1 / -1; }
    .value { font-size: 12px; color: #64748b; margin-top: 8px; min-height: 16px; }
    .custom-theme {
        --rsba-handle-color: #f28e2b;
        --rsba-handle-size: 32px;
        --rsba-line-width: 3px;
        --rsba-radius: 16px;
    }
    button {
        appearance: none; border: 1px solid #cbd5e1; background: #fff; color: #334155;
        padding: 6px 14px; border-radius: 7px; font-size: 13px; cursor: pointer; font-family: inherit;
        margin-top: 8px;
    }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="page">
    <h1>rs-baslider <small>v0.1 デモ — Before/After比較スライダー（依存ゼロ）</small></h1>
    <p class="lead">ハンドルをドラッグ（スマホはスワイプ）、トラックをクリックでジャンプ、フォーカスして矢印キーでも動きます。</p>

    <div class="grid">
        <div class="card wide">
            <h2>基本（横・初期位置35%・日本語ラベル）</h2>
            <div id="ba-basic"></div>
            <div class="value" id="v-basic"></div>
        </div>

        <div class="card">
            <h2>上下比較（vertical）</h2>
            <div id="ba-vertical"></div>
        </div>

        <div class="card">
            <h2>ホバー追従（hover: true・ドラッグ不要）</h2>
            <div id="ba-hover"></div>
        </div>

        <div class="card">
            <h2>ラベルなし＋テーマカスタム（CSS変数）</h2>
            <div id="ba-custom" class="custom-theme"></div>
            <button id="btn-animate">setPosition(80, {animate:true})</button>
        </div>

        <div class="card">
            <h2>canvas要素を直接比較（rs-image等と連携）</h2>
            <div id="ba-canvas"></div>
        </div>
    </div>
</div>

<script type="module">
    import { createRSBASlider } from '../dist/rs-baslider.esm.min.js';
    window.__mod = { createRSBASlider };
    window.sliders = {};

    // ---- サンプル画像（風景っぽい canvas を生成 → before は退色版）
    function scene(w, h, enhance) {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const x = c.getContext('2d');
        if (!enhance) x.filter = 'saturate(0.35) brightness(1.05) contrast(0.85)';
        // 空
        const sky = x.createLinearGradient(0, 0, 0, h * 0.65);
        sky.addColorStop(0, '#2f6fb4'); sky.addColorStop(1, '#a9d4f5');
        x.fillStyle = sky; x.fillRect(0, 0, w, h * 0.65);
        // 太陽
        x.fillStyle = '#ffd75e';
        x.beginPath(); x.arc(w * 0.78, h * 0.22, h * 0.09, 0, Math.PI * 2); x.fill();
        // 山
        x.fillStyle = '#3f7d4e';
        x.beginPath(); x.moveTo(0, h * 0.65); x.lineTo(w * 0.3, h * 0.3); x.lineTo(w * 0.55, h * 0.65); x.closePath(); x.fill();
        x.fillStyle = '#2e5f3b';
        x.beginPath(); x.moveTo(w * 0.35, h * 0.65); x.lineTo(w * 0.65, h * 0.38); x.lineTo(w * 0.95, h * 0.65); x.closePath(); x.fill();
        // 海
        const sea = x.createLinearGradient(0, h * 0.65, 0, h);
        sea.addColorStop(0, '#2a7fb8'); sea.addColorStop(1, '#155a8a');
        x.fillStyle = sea; x.fillRect(0, h * 0.65, w, h * 0.35);
        return c;
    }
    const beforeURL = scene(1000, 560, false).toDataURL('image/png');
    const afterURL = scene(1000, 560, true).toDataURL('image/png');

    window.sliders.basic = createRSBASlider('#ba-basic', {
        before: beforeURL,
        after: afterURL,
        position: 35,
        labels: { before: '加工前', after: '加工後' },
        onChange: (p) => {
            document.getElementById('v-basic').textContent = `position: ${p.toFixed(1)}%`;
        },
    });

    window.sliders.vertical = createRSBASlider('#ba-vertical', {
        before: beforeURL,
        after: afterURL,
        direction: 'vertical',
        labels: { before: 'Before', after: 'After' },
    });

    window.sliders.hover = createRSBASlider('#ba-hover', {
        before: beforeURL,
        after: afterURL,
        hover: true,
    });

    window.sliders.custom = createRSBASlider('#ba-custom', {
        before: beforeURL,
        after: afterURL,
        labels: false,
        position: 20,
    });
    document.getElementById('btn-animate').addEventListener('click', () => {
        window.sliders.custom.setPosition(window.sliders.custom.getPosition() > 50 ? 20 : 80, { animate: true });
    });

    // canvas要素をそのまま渡す（画像化不要）
    window.sliders.canvas = createRSBASlider('#ba-canvas', {
        before: scene(1000, 560, false),
        after: scene(1000, 560, true),
        labels: { before: '元データ', after: '補正後' },
    });
</script>
</body>
</html>
