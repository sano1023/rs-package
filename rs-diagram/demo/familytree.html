<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rs-diagram デモ — 家系図（本人視点アワーグラス）</title>
<link rel="stylesheet" href="../dist/rs-diagram.css">
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
        background: #f1f5f9;
        color: #1e293b;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }
    header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 14px;
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        flex-wrap: wrap;
    }
    header h1 { font-size: 15px; margin: 0 8px 0 0; }
    header h1 small { color: #64748b; font-weight: normal; margin-left: 6px; }
    .toolbar { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .toolbar button {
        padding: 5px 11px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #fff;
        font-size: 12.5px;
        cursor: pointer;
    }
    .toolbar button:hover { background: #f1f5f9; }
    .toolbar .sep { width: 1px; height: 20px; background: #e2e8f0; margin: 0 4px; }
    .toolbar label { font-size: 12.5px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
    #status { font-size: 12px; color: #64748b; margin-left: auto; }
    #hint {
        padding: 6px 14px;
        font-size: 12.5px;
        color: #92400e;
        background: #fffbeb;
        border-bottom: 1px solid #fde68a;
    }
    main { flex: 1; min-height: 0; padding: 10px; }
    #canvas {
        height: 100%;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        overflow: hidden;
    }
    #canvas .rsd { border-radius: 10px; }
</style>
</head>
<body>
<header>
    <h1>rs-diagram<small>家系図テンプレート — 本人視点のアワーグラス配置（<a href="./familytree-embed.html">写真・リンク付きの埋め込み例 →</a>）</small></h1>
    <div class="toolbar">
        <button id="btn-reset">👤 本人に戻す</button>
        <button id="btn-focus" title="ドラッグで離れても現在の視点人物へ戻る">📍 本人へ</button>
        <button id="btn-fit">全体表示</button>
        <span class="sep"></span>
        <label>人数: <select id="sel-size">
            <option value="sample">サンプル 35人</option>
            <option value="1000">合成 1,000人</option>
            <option value="10000">合成 10,000人</option>
        </select></label>
        <span class="sep"></span>
        <button id="btn-png">PNG書出</button>
        <label title="クリックしても視点（本人）を切り替えない"><input type="checkbox" id="chk-lock"> 本人固定</label>
        <label><input type="checkbox" id="chk-edit"> 編集モード</label>
    </div>
    <span id="status"></span>
</header>
<div id="hint"></div>
<main><div id="canvas"></div></main>
<script type="module">
import { createRSDiagram, buildFamilyTree, sampleFamily, makeRandomFamily, familyPerson, familyUnion } from '../dist/rs-diagram.esm.min.js';

let people = sampleFamily();
let scope;   // undefined = ego から辿れる親族のみ / 'all' = 全員配置（合成家系）
const defaultEgo = () => (people.find((p) => p.ego) || people[0]).id;
let ego = defaultEgo();
let lastMs = 0;

const HINTS = {
    reachable: '💡 人物カードをクリックすると<b>その人視点の家系図</b>に組み替わります（視点から辿れない親族 — 例: 本人視点の叔父一家 — は隠れ、視点を移すと現れます）',
    all: '💡 全員を配置したまま、クリックした人へ<b>視点（ハイライト＋中央表示）</b>が移ります。<b>背景ドラッグ</b>でつながりを探索、「全体表示」で俯瞰、「📍 本人へ」で戻れます',
};
function updateHint() {
    document.getElementById('hint').innerHTML = HINTS[scope === 'all' ? 'all' : 'reachable'];
}

const built = buildFamilyTree({ people, ego });
const diagram = createRSDiagram('#canvas', {
    nodes: built.nodes,
    links: built.links,
    nodeTypes: [familyPerson, familyUnion],
    readOnly: true,
    panOnDrag: true,
    grid: { show: false, snap: false },
    contextMenu: false,
    ariaLabel: '家系図',
});

function nameOf(id) {
    const p = people.find((x) => x.id === id);
    return p ? p.name : id;
}
function updateStatus() {
    const shown = diagram.toJSON().nodes.filter((n) => n.type === 'family-person').length;
    document.getElementById('status').textContent
        = `視点: ${nameOf(ego)} ／ 表示 ${shown.toLocaleString()}人 / 全${people.length.toLocaleString()}人`
        + (lastMs ? ` ／ 構築 ${lastMs}ms` : '');
}
/** 初期ビュー: 全体が読める大きさに収まるなら全体、大家系は本人中心（読めるサイズ）で開始 */
function focusEgo() {
    diagram.zoomToFit({ padding: 30 });
    if (diagram.getView().scale < 0.6) diagram.centerOnNode(ego, { scale: 0.9 });
}
function setEgo(id) {
    ego = id;
    const t0 = performance.now();
    const b = buildFamilyTree({ people, ego, scope });
    diagram.fromJSON({ nodes: b.nodes, links: b.links });
    lastMs = Math.round(performance.now() - t0);
    focusEgo();
    updateStatus();
}

diagram.on('nodeClick', (e) => {
    if (document.getElementById('chk-lock').checked) return;   // 本人固定: クリックで視点を変えない
    if (e.node.type === 'family-person' && e.node.id !== ego) setEgo(e.node.id);
});

document.getElementById('btn-reset').addEventListener('click', () => setEgo(defaultEgo()));
document.getElementById('sel-size').addEventListener('change', (e) => {
    const v = e.target.value;
    people = v === 'sample' ? sampleFamily() : makeRandomFamily({ size: Number(v) });
    scope = v === 'sample' ? undefined : 'all';
    updateHint();
    setEgo(defaultEgo());
});
document.getElementById('btn-focus').addEventListener('click', () => diagram.centerOnNode(ego, { scale: 0.9 }));
document.getElementById('btn-fit').addEventListener('click', () => diagram.zoomToFit({ padding: 30 }));
document.getElementById('btn-png').addEventListener('click', () => diagram.exportPNG({ filename: 'familytree.png' }));
document.getElementById('chk-edit').addEventListener('change', (e) => diagram.setReadOnly(!e.target.checked));

focusEgo();
updateHint();
updateStatus();
window.__diagram = diagram;   // 受け入れテスト・コンソール検証用
window.__setEgo = setEgo;
</script>
</body>
</html>
